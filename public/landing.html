<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediaLog — The fourth bucket.</title>
  <meta name="description" content="A personal knowledge system for links, notes, and ideas — organized by topic and actually revisited." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <style>
    /* ── Tokens ──────────────────────────────────────────────────────────── */
    :root {
      --bg:        #F8F5EE;
      --surface:   #FFFFFF;
      --surface-2: #F2EDE3;
      --border:    #DDD7CB;
      --text:      #1C1A15;
      --muted:     #7A7264;
      --accent:    #3D5A4A;
      --amber:     #B85C1A;
      --dark:      #1C1A15;
      --font-ui:   'DM Sans', system-ui, sans-serif;
      --font-serif:'Lora', Georgia, serif;
    }

    /* ── Reset ───────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    img { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }

    /* ── Shared layout ───────────────────────────────────────────────────── */
    .container { max-width: 960px; margin: 0 auto; }

    /* ── Shared typography ───────────────────────────────────────────────── */
    .eyebrow {
      font-family: var(--font-ui);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }
    .section-eyebrow {
      font-family: var(--font-ui);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      text-align: center;
      margin-bottom: 12px;
    }
    .section-headline {
      font-family: var(--font-serif);
      font-size: clamp(24px, 3.5vw, 36px);
      color: var(--text);
      text-align: center;
      margin-bottom: 56px;
      line-height: 1.3;
    }

    /* ── Shared buttons ──────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      font-family: var(--font-ui);
      font-size: 15px;
      font-weight: 500;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      border: none;
    }
    .btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-primary { background: var(--accent); color: #F8F5EE; }
    .btn-ghost-dark {
      background: transparent;
      color: #F8F5EE;
      border: 1px solid rgba(248,245,238,0.3);
    }
    .btn-ghost-dark:hover { border-color: rgba(248,245,238,0.6); }

    /* ── Scroll reveals ──────────────────────────────────────────────────── */
    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.55s ease-out, transform 0.55s ease-out;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-child {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.4s ease-out, transform 0.4s ease-out;
    }
    .reveal-child.visible { opacity: 1; transform: translateY(0); }

    /* ── Orb shared ──────────────────────────────────────────────────────── */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }
    @keyframes float1 {
      0%, 100% { transform: translate(0, 0); }
      33%       { transform: translate(40px, -30px); }
      66%       { transform: translate(-20px, 20px); }
    }
    @keyframes float2 {
      0%, 100% { transform: translate(0, 0); }
      33%       { transform: translate(-50px, 20px); }
      66%       { transform: translate(30px, -40px); }
    }
    @keyframes float3 {
      0%, 100% { transform: translate(0, 0); }
      50%       { transform: translate(-30px, -20px); }
    }
  </style>
</head>
<body>

</html>
