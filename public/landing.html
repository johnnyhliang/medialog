<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediaLog — The fourth bucket.</title>
  <meta name="description" content="A personal knowledge system for links, notes, and ideas — organized by topic and actually revisited." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <style>
    /* ── Tokens ──────────────────────────────────────────────────────────── */
    :root {
      --bg:        #F8F5EE;
      --surface:   #FFFFFF;
      --surface-2: #F2EDE3;
      --border:    #DDD7CB;
      --text:      #1C1A15;
      --muted:     #7A7264;
      --accent:    #3D5A4A;
      --amber:     #B85C1A;
      --dark:      #1C1A15;
      --font-ui:   'DM Sans', system-ui, sans-serif;
      --font-serif:'Lora', Georgia, serif;
    }

    /* ── Reset ───────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    img { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }

    /* ── Shared layout ───────────────────────────────────────────────────── */
    .container { max-width: 960px; margin: 0 auto; }

    /* ── Shared typography ───────────────────────────────────────────────── */
    .eyebrow {
      font-family: var(--font-ui);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }
    .section-eyebrow {
      font-family: var(--font-ui);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      text-align: center;
      margin-bottom: 12px;
    }
    .section-headline {
      font-family: var(--font-serif);
      font-size: clamp(24px, 3.5vw, 36px);
      color: var(--text);
      text-align: center;
      margin-bottom: 56px;
      line-height: 1.3;
    }

    /* ── Shared buttons ──────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      font-family: var(--font-ui);
      font-size: 15px;
      font-weight: 500;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      border: none;
    }
    .btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-primary { background: var(--accent); color: #F8F5EE; }
    .btn-ghost-dark {
      background: transparent;
      color: #F8F5EE;
      border: 1px solid rgba(248,245,238,0.3);
    }
    .btn-ghost-dark:hover { border-color: rgba(248,245,238,0.6); }

    /* ── Scroll reveals ──────────────────────────────────────────────────── */
    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.55s ease-out, transform 0.55s ease-out;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-child {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.4s ease-out, transform 0.4s ease-out;
    }
    .reveal-child.visible { opacity: 1; transform: translateY(0); }

    /* ── Orb shared ──────────────────────────────────────────────────────── */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }
    @keyframes float1 {
      0%, 100% { transform: translate(0, 0); }
      33%       { transform: translate(40px, -30px); }
      66%       { transform: translate(-20px, 20px); }
    }
    @keyframes float2 {
      0%, 100% { transform: translate(0, 0); }
      33%       { transform: translate(-50px, 20px); }
      66%       { transform: translate(30px, -40px); }
    }
    @keyframes float3 {
      0%, 100% { transform: translate(0, 0); }
      50%       { transform: translate(-30px, -20px); }
    }

    /* ── Hero ────────────────────────────────────────────────────────────────── */
    .hero {
      background: var(--dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 80px 24px;
    }
    .orb-1 {
      width: 320px; height: 320px;
      background: #3D5A4A; opacity: 0.12;
      top: 15%; left: 10%;
      animation: float1 20s ease-in-out infinite;
    }
    .orb-2 {
      width: 260px; height: 260px;
      background: #B85C1A; opacity: 0.10;
      top: 45%; right: 8%;
      animation: float2 25s ease-in-out infinite;
    }
    .orb-3 {
      width: 200px; height: 200px;
      background: #F8F5EE; opacity: 0.06;
      bottom: 15%; left: 38%;
      animation: float3 30s ease-in-out infinite;
    }
    .hero-content {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 820px;
      width: 100%;
    }
    .hero .eyebrow { color: var(--accent); margin-bottom: 20px; }
    .hero-headline {
      font-family: var(--font-serif);
      font-size: clamp(36px, 6vw, 64px);
      font-weight: 600;
      color: #F8F5EE;
      line-height: 1.1;
      margin-bottom: 20px;
    }
    .hero-sub {
      font-family: var(--font-ui);
      font-size: clamp(15px, 2vw, 18px);
      color: var(--muted);
      line-height: 1.75;
      max-width: 520px;
      margin: 0 auto 36px;
    }
    .cta-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 56px;
      flex-wrap: wrap;
    }
    .mockup-wrap {
      opacity: 0;
      transform: translateY(12px);
      animation: mockupIn 0.8s ease-out 0.3s forwards;
    }
    @keyframes mockupIn {
      to { opacity: 1; transform: translateY(0); }
    }
    .mockup-frame {
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 40px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.07);
      max-width: 900px;
      margin: 0 auto;
    }
    .mockup-chrome {
      background: #2A2722;
      padding: 10px 16px;
      display: flex;
      gap: 7px;
      align-items: center;
    }
    .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: rgba(255,255,255,0.14);
    }
    .mockup-frame img {
      width: 100%;
      display: block;
      height: 480px;
      object-fit: cover;
      object-position: top;
    }
  </style>
</head>
<body>

  <!-- ── Hero ─────────────────────────────────────────────────────────────── -->
  <section class="hero">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="hero-content">
      <p class="eyebrow">Open Source &nbsp;·&nbsp; Free</p>
      <h1 class="hero-headline">The fourth bucket.</h1>
      <p class="hero-sub">
        A personal knowledge system for links, notes, and ideas —
        organized by topic and actually revisited.
      </p>
      <div class="cta-row">
        <a href="#" class="btn btn-primary">Open App</a>
        <a href="#" class="btn btn-ghost-dark">View on GitHub</a>
      </div>
      <div class="mockup-wrap">
        <div class="mockup-frame">
          <div class="mockup-chrome">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
          <img
            src="https://picsum.photos/seed/medialog/1200/750"
            alt="MediaLog app interface"
            loading="lazy"
          />
        </div>
      </div>
    </div>
  </section>

  <script>
    /* JS goes here in Task 5 */
  </script>
</body>
</html>
